<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <div class="logo-container">
        <span class="medical-icon">🦷</span>
        <h1 class="medical-title">ZAZDENT</h1>
      </div>
      <mat-card-subtitle>Gestión Odontológica Profesional</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Usuario o Email</mat-label>
          <input matInput formControlName="username" placeholder="ej: admin@test.com">
          <mat-icon matSuffix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('username')?.hasError('required')">
            El usuario es obligatorio
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es obligatoria
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width medical-btn" type="submit" [disabled]="loginForm.invalid || isLoading">
          {{ isLoading ? 'Iniciando sesión...' : 'Ingresar al Sistema' }}
        </button>
      </form>
    </mat-card-content>
    
    <mat-card-footer>
      <p class="footer-text">© 2026 Zazdent Enterprise - v2.0 Angular</p>
    </mat-card-footer>
  </mat-card>
</div>
