<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light px-3 py-5">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="max-width: 440px; width: 100%;">
    <div class="card-body p-4 p-md-5">
      <!-- Logo & Welcome -->
      <div class="text-center mb-5">
        <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
          <lucide-icon name="user-circle" [size]="40" class="text-primary"></lucide-icon>
        </div>
        <h2 class="fw-bold text-dark mb-1">Bienvenido</h2>
        <p class="text-muted small">Ingresa tus credenciales para acceder al sistema</p>
      </div>

      <!-- Form -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="needs-validation" novalidate>
        <div class="mb-4">
          <label class="form-label small fw-bold text-dark">Usuario</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 text-muted ps-3">
              <lucide-icon name="user" [size]="18"></lucide-icon>
            </span>
            <input type="text" class="form-control border-start-0 py-2 shadow-none" 
                   formControlName="username" placeholder="Nombre de usuario"
                   [class.is-invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          </div>
          <div class="invalid-feedback">El usuario es requerido</div>
        </div>

        <div class="mb-5">
          <label class="form-label small fw-bold text-dark">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0 text-muted ps-3">
              <lucide-icon name="lock" [size]="18"></lucide-icon>
            </span>
            <input [type]="hidePassword ? 'password' : 'text'" 
                   class="form-control border-start-0 py-2 border-end-0 shadow-none" 
                   formControlName="password" placeholder="••••••••"
                   [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <button class="btn btn-outline-light border border-start-0 text-muted px-3 shadow-none" 
                    type="button" (click)="hidePassword = !hidePassword">
              <lucide-icon [name]="hidePassword ? 'eye-off' : 'eye'" [size]="18"></lucide-icon>
            </button>
          </div>
          <div class="invalid-feedback">La contraseña es requerida</div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-100 py-3 rounded-3 fw-bold shadow-sm" 
                [disabled]="loginForm.invalid || isLoading">
          <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
          {{ isLoading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
        </button>
      </form>

      <div class="mt-5 text-center">
        <p class="small text-muted mb-0">¿Problemas con tu acceso?</p>
        <a href="#" class="text-primary small text-decoration-none fw-bold">Contactar a soporte</a>
      </div>
    </div>
  </div>
</div>
