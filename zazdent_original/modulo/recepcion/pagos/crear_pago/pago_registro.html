<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Nuevo Pago</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa; /* Light gray background */
        }
        .container {
            margin-top: 50px;
            margin-bottom: 50px;
        }
        .card-header {
            background-color: #007bff; /* Primary blue for header */
            color: white;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-currency-dollar me-2"></i>Registrar Nuevo Pago</h4>
            </div>
            <div class="card-body">
                <form id="form-registro-pago" novalidate>
                    <div class="mb-3">
                        <label for="id_cita" class="form-label">Cita / Paciente:</label>
                        <select class="form-select" id="id_cita" name="id_cita" required>
                            <option value="">Cargando citas...</option>
                            </select>
                        <div class="invalid-feedback">Por favor, seleccione una cita.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="monto" class="form-label">Monto ($):</label>
                            <input type="number" id="monto" name="monto" step="0.01" min="0" class="form-control" required>
                            <div class="invalid-feedback">Por favor, ingrese un monto válido.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="metodo_pago" class="form-label">Método de Pago:</label>
                            <select class="form-select" id="metodo_pago" name="metodo_pago" required>
                                <option value="">Seleccione un método</option>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Tarjeta crédito">Tarjeta Crédito</option>
                                <option value="Tarjeta débito">Tarjeta Débito</option>
                                <option value="Transferencia">Transferencia</option>
                            </select>
                            <div class="invalid-feedback">Por favor, seleccione un método de pago.</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="estado" class="form-label">Estado del Pago:</label>
                            <select class="form-select" id="estado" name="estado" required>
                                <option value="Pendiente">Pendiente</option>
                                <option value="Completado">Completado</option>
                                <option value="Reembolsado">Reembolsado</option>
                                <option value="Cancelado">Cancelado</option>
                            </select>
                            <div class="invalid-feedback">Por favor, seleccione un estado.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="fecha_pago" class="form-label">Fecha y Hora de Pago:</label>
                            <input type="datetime-local" id="fecha_pago" name="fecha_pago" class="form-control" required>
                            <div class="invalid-feedback">Por favor, ingrese la fecha y hora del pago.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="referencia" class="form-label">Referencia (opcional):</label>
                        <input type="text" id="referencia" name="referencia" maxlength="50" class="form-control">
                    </div>

                    <div class="mb-3">
                        <label for="notas" class="form-label">Notas (opcional):</label>
                        <textarea id="notas" name="notas" rows="3" class="form-control"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-2"></i>Registrar Pago
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="pago_registro.js"></script>
</body>
</html>
