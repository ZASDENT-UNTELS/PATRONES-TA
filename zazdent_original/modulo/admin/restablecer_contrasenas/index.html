<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña | AlbumClinica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0d6efd;
            --secondary-color: #6c757d;
            --success-color: #198754;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --light-color: #f8f9fa;
            --dark-color: #212529;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .password-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
        }
        
        .password-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #0b5ed7 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .password-logo {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        
        .password-body {
            padding: 30px;
        }
        
        .password-footer {
            text-align: center;
            padding: 20px;
            background-color: var(--light-color);
            font-size: 0.9rem;
            color: var(--secondary-color);
        }
        
        .password-note {
            background: #e7f1ff;
            border-left: 4px solid var(--primary-color);
            padding: 15px;
            border-radius: 0 5px 5px 0;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        
        .password-note i {
            margin-right: 8px;
            color: var(--primary-color);
        }
        
        .password-strength {
            height: 5px;
            border-radius: 5px;
            margin: 10px 0 20px;
            background: #e9ecef;
            overflow: hidden;
        }
        
        .strength-meter {
            height: 100%;
            width: 0;
            transition: width 0.3s ease, background 0.3s ease;
        }
        
        .password-requirements {
            font-size: 0.85rem;
            color: var(--secondary-color);
            margin-bottom: 20px;
        }
        
        .requirement {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .requirement i {
            margin-right: 8px;
            font-size: 0.8rem;
        }
        
        .requirement.valid {
            color: var(--success-color);
        }
        
        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--secondary-color);
        }
    </style>
</head>
<body>
    <div class="password-container">
        <div class="password-header">
            <div class="password-logo">
                <i class="fas fa-key"></i>
            </div>
            <h3>Restablecer Contraseña</h3>
            <p>Ingresa tu correo electrónico para comenzar</p>
        </div>
        
        <div class="password-body">
            <div id="error-container" class="alert alert-danger d-none"></div>
            
            <form id="email-form">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email" 
                               placeholder="tucorreo@ejemplo.com" required>
                    </div>
                </div>
                
                <div class="password-note">
                    <i class="fas fa-info-circle"></i>
                    Te enviaremos una contraseña temporal que podrás usar para iniciar sesión.
                </div>
                
                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    Continuar <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </form>
            
            <div class="mt-3 text-center">
                <a href="../../../bienvenido/login.php" class="text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i> Volver al inicio de sesión
                </a>
            </div>
        </div>
        
        <div class="password-footer">
            <p>© 2025 AlbumClinica. Todos los derechos reservados.</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
