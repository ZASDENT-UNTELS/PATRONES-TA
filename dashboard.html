<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAZDENT - Panel de Control</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --dark: #0f172a;
            --sidebar: #1e293b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text-main: #334155;
            --text-muted: #64748b;
            --white: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: var(--light);
            color: var(--text-main);
        }
        
        .container {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar);
            color: var(--white);
            padding: 24px;
            overflow-y: auto;
            box-shadow: 4px 0 15px rgba(0,0,0,0.05);
        }
        
        .sidebar h1 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 30px;
            text-align: left;
            padding-bottom: 15px;
            color: var(--white);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .user-info {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .user-info p {
            margin: 4px 0;
            color: #cbd5e1;
        }
        
        .user-info strong {
            color: var(--white);
            font-weight: 600;
            font-size: 15px;
        }
        
        .nav-menu {
            list-style: none;
        }
        
        .nav-menu li {
            margin: 8px 0;
        }
        
        .nav-menu a {
            display: block;
            padding: 12px 16px;
            color: #94a3b8;
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s ease;
            cursor: pointer;
            font-weight: 500;
        }
        
        .nav-menu a:hover,
        .nav-menu a.active {
            background: var(--primary);
            color: var(--white);
        }
        
        .logout-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            cursor: pointer;
            margin-top: 40px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: var(--danger);
            color: var(--white);
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        
        .header h2 {
            font-size: 28px;
            font-weight: 700;
            color: var(--dark);
        }
        
        .datetime {
            font-size: 14px;
            color: var(--text-muted);
            background: var(--white);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        
        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }
        
        .card {
            background: var(--white);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
        }
        
        .card h3 {
            color: var(--text-muted);
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .card .number {
            font-size: 36px;
            font-weight: 800;
            color: var(--dark);
            margin: 10px 0;
        }
        
        .card p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Sections */
        .section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .section.active {
            display: block;
        }
        
        .table-container {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            overflow-x: auto;
        }
        
        .table-container h3 {
            margin-bottom: 20px;
            color: var(--dark);
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th {
            background: var(--light);
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-size: 14px;
        }
        
        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--light);
        }
        
        .status {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status.confirmada, .status.pagado {
            background: #dcfce7;
            color: #166534;
        }
        
        .status.pendiente {
            background: #fef9c3;
            color: #854d0e;
        }
        
        .status.cancelada, .status.anulado {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--white);
            color: var(--text-main);
        }
        
        .btn-edit:hover {
            background: var(--light);
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .btn-delete:hover {
            background: #fee2e2;
            border-color: var(--danger);
            color: var(--danger);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--dark);
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn-submit {
            background: var(--primary);
            color: var(--white);
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
        
        .message {
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
            display: block;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            display: block;
        }
        
        /* Modales */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
        
        .modal-content {
            background-color: var(--white);
            margin: 5% auto;
            padding: 32px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .modal-content h3 {
            margin-bottom: 24px;
            color: var(--dark);
            font-size: 20px;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 24px;
            color: var(--text-muted);
            font-size: 24px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .close-btn:hover {
            color: var(--dark);
        }
        
        .form-row {
            display: flex;
            gap: 20px;
        }
        
        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h1>🦷 ZAZDENT</h1>
            <div class="user-info" id="userInfo">
                <p><strong id="userName">Usuario</strong></p>
                <p id="userRole" style="font-size: 12px;">Rol</p>
            </div>
            
            <ul class="nav-menu" id="navMenu">
                <!-- Se cargará dinámicamente según el rol -->
            </ul>
            
            <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div>
                    <h2 id="pageTitle">Panel de Control</h2>
                </div>
                <div class="datetime" id="datetime"></div>
            </div>
            
            <div id="messageContainer"></div>
            
            <!-- Dashboard Section -->
            <section id="dashboard" class="section active">
                <div class="dashboard-grid" id="dashboardCards">
                    <!-- Se cargará dinámicamente -->
                </div>
            </section>
            
            <!-- Citas Section -->
            <section id="citas" class="section">
                <div class="table-container">
                    <h3>Gestión de Citas</h3>
                    <button class="btn-submit" onclick="openCitaForm()">+ Nueva Cita</button>
                    <table id="citasTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Paciente</th>
                                <th>Dentista</th>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="citasBody">
                        </tbody>
                    </table>
                </div>
            </section>
            
            <!-- Usuarios Section -->
            <section id="usuarios" class="section">
                <div class="table-container" style="padding: 0; border: none; box-shadow: none; background: transparent;">
                    <iframe src="usuarios.php?embed=1" style="width: 100%; height: 80vh; border: none; border-radius: 12px;"></iframe>
                </div>
            </section>
            
            <!-- Pacientes Section -->
            <section id="pacientes" class="section">
                <div class="table-container">
                    <h3>Mi Perfil</h3>
                    <div id="perfilPaciente"></div>
                </div>
            </section>
            
            <!-- Pagos Section -->
            <section id="pagos" class="section">
                <div class="table-container">
                    <h3>Gestión de Pagos</h3>
                    <button class="btn-submit" onclick="openPagoForm()">+ Nuevo Pago</button>
                    <table id="pagosTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Paciente</th>
                                <th>Monto</th>
                                <th>Fecha</th>
                                <th>Método</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="pagosBody">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        <!-- Modales -->
        <!-- Modal Cita -->
        <div id="citaModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('citaModal')">&times;</span>
                <h3>Nueva Cita</h3>
                <form id="formCita" onsubmit="guardarCita(event)">
                    <div class="form-group">
                        <label for="citaPaciente">Paciente</label>
                        <select id="citaPaciente" required><option value="">Seleccione Paciente</option></select>
                    </div>
                    <div class="form-group">
                        <label for="citaDentista">Dentista</label>
                        <select id="citaDentista" required><option value="">Seleccione Dentista</option></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="citaFecha">Fecha</label>
                            <input type="date" id="citaFecha" required>
                        </div>
                        <div class="form-group">
                            <label for="citaHora">Hora</label>
                            <input type="time" id="citaHora" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="citaNotas">Notas / Motivo</label>
                        <textarea id="citaNotas" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn-submit">Guardar Cita</button>
                </form>
            </div>
        </div>

        <!-- Modal Pago -->
        <div id="pagoModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('pagoModal')">&times;</span>
                <h3>Registrar Pago</h3>
                <form id="formPago" onsubmit="guardarPago(event)">
                    <div class="form-group">
                        <label for="pagoPaciente">Paciente</label>
                        <select id="pagoPaciente" required><option value="">Seleccione Paciente</option></select>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="pagoMonto">Monto (S/.)</label>
                            <input type="number" id="pagoMonto" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="pagoMetodo">Método</label>
                            <select id="pagoMetodo" required>
                                <option value="Efectivo">Efectivo</option>
                                <option value="Tarjeta">Tarjeta</option>
                                <option value="Transferencia">Transferencia</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Registrar Pago</button>
                </form>
            </div>
        </div>

        <!-- Modal Usuario -->
        <div id="usuarioModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('usuarioModal')">&times;</span>
                <h3>Nuevo Usuario</h3>
                <form id="formUsuario" onsubmit="guardarUsuario(event)">
                    <p style="color:#666; font-size:12px; margin-bottom:15px;">Nota: Esta es la vista preliminar de gestión de usuarios.</p>
                    <div class="form-group">
                        <label for="usuNombre">Nombre Completo</label>
                        <input type="text" id="usuNombre" required>
                    </div>
                    <div class="form-group">
                        <label for="usuUsername">Usuario</label>
                        <input type="text" id="usuUsername" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="usuEmail">Email</label>
                            <input type="email" id="usuEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="usuRol">Rol</label>
                            <select id="usuRol" required>
                                <option value="1">Administrador</option>
                                <option value="2">Dentista</option>
                                <option value="3">Recepción</option>
                                <option value="4">Paciente</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="usuPassword">Contraseña</label>
                            <input type="password" id="usuPassword" required>
                        </div>
                        <div class="form-group">
                            <label for="usuPasswordConfirm">Confirmar contraseña</label>
                            <input type="password" id="usuPasswordConfirm" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit">Crear Usuario</button>
                </form>
            </div>
        </div>

    </div>

    <script>
        const API_BASE = '/PATRONES-TA/public';
        
        // ── Inicialización ─────────────────────────────────────
        
        async function init() {
            const user = await getCurrentUser();
            if (!user) {
                window.location.href = '/PATRONES-TA/login.html';
                return;
            }
            
            setupUI(user);
            loadDashboard();
            updateDateTime();
            setInterval(updateDateTime, 1000);
        }
        
        async function getCurrentUser() {
            try {
                const response = await fetch(`${API_BASE}/api/auth/me`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    return await response.json();
                }
            } catch (e) {
                console.error('Error:', e);
            }
            return null;
        }
        
        function setupUI(user) {
            document.getElementById('userName').textContent = user.nombre || 'Usuario';
            document.getElementById('userRole').textContent = user.rol || 'Sin rol';
            
            const menu = document.getElementById('navMenu');
            menu.innerHTML = '';
            
            // Menú según rol
            const menuItems = {
                1: [ // Admin
                    { label: '📊 Dashboard', id: 'dashboard' },
                    { label: '📅 Citas', id: 'citas' },
                    { label: '👥 Usuarios', id: 'usuarios' },
                    { label: '💰 Pagos', id: 'pagos' }
                ],
                2: [ // Dentista
                    { label: '📊 Dashboard', id: 'dashboard' },
                    { label: '📅 Mis Citas', id: 'citas' }
                ],
                3: [ // Recepción
                    { label: '📊 Dashboard', id: 'dashboard' },
                    { label: '📅 Citas', id: 'citas' },
                    { label: '💰 Pagos', id: 'pagos' }
                ],
                4: [ // Paciente
                    { label: '📊 Dashboard', id: 'dashboard' },
                    { label: '👤 Mi Perfil', id: 'pacientes' },
                    { label: '📅 Mis Citas', id: 'citas' },
                    { label: '💰 Mis Pagos', id: 'pagos' }
                ]
            };
            
            const items = menuItems[user.id_rol] || [];
            items.forEach(item => {
                const li = document.createElement('li');
                li.innerHTML = `<a onclick="showSection('${item.id}')">${item.label}</a>`;
                menu.appendChild(li);
            });
        }
        
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            document.getElementById('pageTitle').textContent = 
                sectionId === 'dashboard' ? 'Panel de Control' :
                sectionId === 'citas' ? 'Gestión de Citas' :
                sectionId === 'usuarios' ? 'Gestión de Usuarios' :
                sectionId === 'pacientes' ? 'Mi Perfil' :
                sectionId === 'pagos' ? 'Gestión de Pagos' : 'Panel';
            
            if (sectionId !== 'dashboard') {
                loadData(sectionId);
            }
        }
        
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_BASE}/api/dashboard`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const stats = await response.json();
                    displayDashboard(stats);
                }
            } catch (e) {
                console.error('Error cargando dashboard:', e);
            }
        }
        
        function displayDashboard(stats) {
            const container = document.getElementById('dashboardCards');
            container.innerHTML = `
                <div class="card">
                    <h3>Citas Hoy</h3>
                    <div class="number">${stats.citasHoy || 0}</div>
                    <p>Citas programadas</p>
                </div>
                <div class="card">
                    <h3>Pacientes</h3>
                    <div class="number">${stats.totalPacientes || 0}</div>
                    <p>Total en el sistema</p>
                </div>
                <div class="card">
                    <h3>Ingresos Este Mes</h3>
                    <div class="number">S/. ${(stats.ingresosEsteMes || 0).toFixed(2)}</div>
                    <p>Total recaudado</p>
                </div>
                <div class="card">
                    <h3>Dentistas</h3>
                    <div class="number">${stats.totalDentistas || 0}</div>
                    <p>Profesionales activos</p>
                </div>
            `;
        }
        
        async function loadData(section) {
            if (section === 'citas') {
                loadCitas();
            } else if (section === 'usuarios') {
                loadUsuarios();
            } else if (section === 'pacientes') {
                loadPerfil();
            } else if (section === 'pagos') {
                loadPagos();
            }
        }
        
        async function loadCitas() {
            try {
                const response = await fetch(`${API_BASE}/api/citas`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const citas = await response.json();
                    const tbody = document.getElementById('citasBody');
                    tbody.innerHTML = '';
                    
                    if (!citas || citas.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#999;">No hay citas registradas</td></tr>';
                        return;
                    }
                    
                    (citas || []).forEach(cita => {
                        const estado = cita.estado || 'pendiente';
                        tbody.innerHTML += `
                            <tr>
                                <td>${cita.id_cita || 'N/A'}</td>
                                <td>${cita.paciente_nombre || cita.nombre_paciente || 'N/A'}</td>
                                <td>${cita.dentista_nombre || cita.nombre_dentista || 'N/A'}</td>
                                <td>${cita.fecha || 'N/A'}</td>
                                <td>${cita.hora || 'N/A'}</td>
                                <td><span class="status ${estado.toLowerCase()}">${estado}</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn-sm btn-edit" onclick="editarCita(${cita.id_cita})">Editar</button>
                                        <button class="btn-sm btn-delete" onclick="cancelarCita(${cita.id_cita})">Cancelar</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    showMessage('Error cargando citas', 'error');
                }
            } catch (e) {
                console.error('Error:', e);
                showMessage('Error de conexión', 'error');
            }
        }
        
        async function loadPagos() {
            try {
                const response = await fetch(`${API_BASE}/api/pagos`, {
                    credentials: 'include'
                });
                
                if (response.ok) {
                    const pagos = await response.json();
                    const tbody = document.getElementById('pagosBody');
                    tbody.innerHTML = '';
                    
                    (pagos || []).forEach(pago => {
                        tbody.innerHTML += `
                            <tr>
                                <td>${pago.id_pago}</td>
                                <td>${pago.paciente_nombre || 'N/A'}</td>
                                <td>S/. ${pago.monto_total || 0}</td>
                                <td>${pago.fecha}</td>
                                <td>${pago.metodo_pago || 'N/A'}</td>
                                <td><span class="status confirmada">Pagado</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn-sm btn-delete">Anular</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error('Error:', e);
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        async function loadUsuarios() {
            try {
                const response = await fetch(`${API_BASE}/api/usuarios`, { credentials: 'include' });
                if (response.ok) {
                    const usuarios = await response.json();
                    const tbody = document.getElementById('usuariosBody');
                    tbody.innerHTML = '';
                    (usuarios || []).forEach(usu => {
                        const estado = usu.activo == 1 ? 'Activo' : 'Inactivo';
                        const estadoClass = usu.activo == 1 ? 'confirmada' : 'cancelada';
                        tbody.innerHTML += `
                            <tr>
                                <td>${usu.id_usuario}</td>
                                <td>${usu.usuario_usuario}</td>
                                <td>${usu.nombre_apellido}</td>
                                <td>${usu.email}</td>
                                <td>${usu.nombre_rol || 'Usuario'}</td>
                                <td><span class="status ${estadoClass}">${estado}</span></td>
                                <td>
                                    <div class="btn-group">
                                        <button class="btn-sm btn-edit">Editar</button>
                                        <button class="btn-sm btn-delete">Eliminar</button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function loadPerfil() {
            try {
                const response = await fetch(`${API_BASE}/api/paciente/perfil`, { credentials: 'include' });
                if (response.ok) {
                    const perfil = await response.json();
                    const div = document.getElementById('perfilPaciente');
                    div.innerHTML = `
                        <div style="display:flex; gap: 20px; background:#f9f9f9; padding:20px; border-radius:8px;">
                            <div style="flex:1;">
                                <p><strong>Nombre:</strong> ${perfil.nombre_apellido || '-'}</p>
                                <p><strong>Email:</strong> ${perfil.email || '-'}</p>
                                <p><strong>Teléfono:</strong> ${perfil.telefono || '-'}</p>
                                <p><strong>Dirección:</strong> ${perfil.direccion || '-'}</p>
                            </div>
                            <div style="flex:1;">
                                <p><strong>Fecha Nacimiento:</strong> ${perfil.fecha_nacimiento || '-'}</p>
                                <p><strong>Género:</strong> ${perfil.genero || '-'}</p>
                                <p><strong>Alergias:</strong> ${perfil.alergias || 'Ninguna'}</p>
                                <p><strong>Seguro Médico:</strong> ${perfil.seguro_medico || 'No'}</p>
                            </div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error(e);
            }
        }
        
        async function openCitaForm() {
            document.getElementById('citaModal').style.display = 'block';
            try {
                // Cargar Pacientes
                const resPac = await fetch(`${API_BASE}/api/pacientes`, { credentials: 'include' });
                if (resPac.ok) {
                    const pacientes = await resPac.json();
                    const select = document.getElementById('citaPaciente');
                    select.innerHTML = '<option value="">Seleccione Paciente</option>';
                    pacientes.forEach(p => {
                        select.innerHTML += `<option value="${p.id}">${p.nombreApellido}</option>`;
                    });
                }
                // Cargar Dentistas
                const resDent = await fetch(`${API_BASE}/api/dentistas`, { credentials: 'include' });
                if (resDent.ok) {
                    const dentistas = await resDent.json();
                    const select = document.getElementById('citaDentista');
                    select.innerHTML = '<option value="">Seleccione Dentista</option>';
                    dentistas.forEach(d => {
                        select.innerHTML += `<option value="${d.id_dentista}">${d.nombre} (${d.especialidad})</option>`;
                    });
                }
            } catch (e) {
                console.error('Error cargando listas:', e);
            }
        }
        
        async function guardarCita(e) {
            e.preventDefault();
            const data = {
                id_paciente: document.getElementById('citaPaciente').value,
                id_dentista: document.getElementById('citaDentista').value,
                fecha: document.getElementById('citaFecha').value,
                hora: document.getElementById('citaHora').value,
                motivo: document.getElementById('citaNotas').value
            };
            try {
                const res = await fetch(`${API_BASE}/api/citas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showMessage('Cita creada con éxito', 'success');
                    closeModal('citaModal');
                    document.getElementById('formCita').reset();
                    loadCitas();
                    loadDashboard();
                } else {
                    showMessage('Error al crear cita', 'error');
                }
            } catch (e) { console.error(e); }
        }

        async function openPagoForm() {
            document.getElementById('pagoModal').style.display = 'block';
            try {
                const resPac = await fetch(`${API_BASE}/api/pacientes`, { credentials: 'include' });
                if (resPac.ok) {
                    const pacientes = await resPac.json();
                    const select = document.getElementById('pagoPaciente');
                    select.innerHTML = '<option value="">Seleccione Paciente</option>';
                    pacientes.forEach(p => {
                        select.innerHTML += `<option value="${p.id}">${p.nombreApellido}</option>`;
                    });
                }
            } catch (e) { console.error(e); }
        }

        async function guardarPago(e) {
            e.preventDefault();
            const data = {
                id_paciente: document.getElementById('pagoPaciente').value,
                monto_total: document.getElementById('pagoMonto').value,
                metodo_pago: document.getElementById('pagoMetodo').value,
                fecha: new Date().toISOString().split('T')[0]
            };
            try {
                const res = await fetch(`${API_BASE}/api/pagos`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    showMessage('Pago registrado con éxito', 'success');
                    closeModal('pagoModal');
                    document.getElementById('formPago').reset();
                    loadPagos();
                    loadDashboard();
                } else {
                    showMessage('Error al registrar pago', 'error');
                }
            } catch (e) { console.error(e); }
        }

        function openUsuarioForm() {
            document.getElementById('formUsuario').reset();
            document.getElementById('usuarioModal').style.display = 'block';
        }

        async function guardarUsuario(e) {
            e.preventDefault();

            const nombre = document.getElementById('usuNombre').value.trim();
            const usuario = document.getElementById('usuUsername').value.trim();
            const email = document.getElementById('usuEmail').value.trim();
            const rol = document.getElementById('usuRol').value;
            const password = document.getElementById('usuPassword').value;
            const confirmPassword = document.getElementById('usuPasswordConfirm').value;

            if (!nombre || !usuario || !email || !rol || !password || !confirmPassword) {
                showMessage('Por favor complete todos los campos obligatorios.', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Las contraseñas no coinciden.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/usuarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({
                        nombre_apellido: nombre,
                        usuario_usuario: usuario,
                        email,
                        password,
                        id_rol: Number(rol)
                    })
                });

                const json = await response.json();
                if (response.ok) {
                    showMessage(json.message || 'Usuario registrado correctamente.', 'success');
                    closeModal('usuarioModal');
                    document.getElementById('formUsuario').reset();
                    loadUsuarios();
                } else {
                    showMessage(json.error || json.message || 'Error al registrar usuario.', 'error');
                }
            } catch (e) {
                console.error(e);
                showMessage('Error de conexión al crear usuario.', 'error');
            }
        }
        
        function editarCita(id) {
            showMessage('Edición de cita no disponible aún', 'error');
        }
        
        async function cancelarCita(id) {
            if (confirm('¿Deseas cancelar esta cita?')) {
                try {
                    const response = await fetch(`${API_BASE}/api/citas/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        credentials: 'include',
                        body: JSON.stringify({ estado: 'cancelada' })
                    });
                    
                    if (response.ok) {
                        showMessage('Cita cancelada correctamente', 'success');
                        loadCitas();
                    } else {
                        showMessage('Error al cancelar la cita', 'error');
                    }
                } catch (e) {
                    showMessage('Error de conexión', 'error');
                }
            }
        }
        
        async function logout() {
            if (confirm('¿Deseas cerrar sesión?')) {
                try {
                    await fetch(`${API_BASE}/api/auth/logout`, {
                        method: 'POST',
                        credentials: 'include'
                    });
                    window.location.href = '/PATRONES-TA/login.html';
                } catch (e) {
                    console.error('Error:', e);
                }
            }
        }
        
        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            container.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }
        
        function updateDateTime() {
            const now = new Date();
            document.getElementById('datetime').textContent = 
                now.toLocaleString('es-PE', { 
                    weekday: 'long', 
                    year: 'numeric', 
                    month: 'long', 
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
        }
        
        // Iniciar cuando la página cargue
        window.addEventListener('load', init);
    </script>
</body>
</html>
